trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  resourceGroupName: 'rg-devops-lab-dev'
  templateFile: 'infra/main.bicep'
  parameterFile: 'infra/parameters/dev.bicepparam'

steps:
- checkout: self

- script: |
    echo "Checking Azure CLI"
    az version
  displayName: 'Check Azure CLI'

- script: |
    echo "Checking Bicep CLI"
    az bicep version
  displayName: 'Check Bicep CLI'

- script: |
    echo "Building Bicep template"
    az bicep build --file $(templateFile)
  displayName: 'Build Bicep Template'

- task: AzureCLI@2
  displayName: 'Show Azure Context'
  inputs:
    azureSubscription: 'sc-devops-lab'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Signed in subscription:"
      az account show --output table
      echo "Checking target resource group:"
      az group show --name $(resourceGroupName) --output table

- task: AzureCLI@2
  displayName: 'Run Bicep What-If'
  inputs:
    azureSubscription: 'sc-devops-lab'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Running What-If deployment preview"

      az deployment group what-if \
        --resource-group $(resourceGroupName) \
        --template-file $(templateFile) \
        --parameters $(parameterFile)